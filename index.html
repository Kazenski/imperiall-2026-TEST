<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imperiall VTT - Painel Unificado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-900 text-slate-200 font-sans h-screen w-screen flex flex-col overflow-hidden">

    <div id="auth-view" class="fixed inset-0 z-[9999] bg-slate-900 flex items-center justify-center">
        <div class="max-w-md w-full bg-slate-800 p-8 rounded-xl border border-amber-500/30 shadow-2xl">
            <h2 class="text-3xl font-bold text-center text-amber-400 mb-6 font-cinzel">Acesso Imperiall</h2>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email" class="w-full bg-slate-900 border border-slate-700 rounded px-4 py-3 outline-none focus:border-amber-500 text-white">
                <input type="password" id="auth-password" placeholder="Senha" class="w-full bg-slate-900 border border-slate-700 rounded px-4 py-3 outline-none focus:border-amber-500 text-white">
                <button id="btn-login" class="w-full bg-amber-600 hover:bg-amber-500 text-black font-bold uppercase py-3 rounded mt-4 transition-all">Entrar</button>
            </div>
        </div>
    </div>

    <div id="app-view" class="hidden flex flex-col h-full w-full">
        <nav id="global-top-nav" class="bg-slate-900 border-b border-slate-700 flex items-center justify-between px-6 h-16 shrink-0 z-50 shadow-lg">
            <div class="flex items-center gap-6 h-full">
                <div class="font-cinzel text-xl font-bold text-amber-500 tracking-wider mr-4">PAINEL UNIFICADO</div>
                <div id="master-tabs" class="flex gap-2 h-full py-2">
                    </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="header-world-widget" class="text-xs font-mono text-slate-400"></div>
                <button id="btn-logout" class="bg-slate-800 hover:bg-red-900/40 border border-slate-600 text-slate-300 px-4 py-1.5 rounded text-xs font-bold transition">Sair</button>
            </div>
        </nav>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-60 bg-slate-800 border-r border-slate-700 flex flex-col shrink-0 z-40 shadow-xl">
                <div class="p-3 bg-slate-900">
                    <select id="character-select" class="w-full bg-slate-800 border border-slate-600 rounded text-amber-400 font-bold p-1.5 text-xs focus:border-amber-500 outline-none"></select>
                </div>
                <div class="w-full aspect-square bg-black border-b border-slate-700 relative">
                    <img id="sidebar-char-img" src="https://placehold.co/400x400/1e293b/f59e0b?text=Sem+Foto" class="w-full h-full object-cover opacity-80">
                    <div id="sidebar-quick-bars" class="absolute bottom-0 left-0 w-full p-2 bg-slate-900/80 backdrop-blur-sm space-y-1">
                        <div class="h-2 w-full bg-slate-950 rounded-full overflow-hidden border border-slate-800"><div id="hdr-hp-base" class="h-full bg-red-600 w-0 transition-all"></div></div>
                        <div class="h-2 w-full bg-slate-950 rounded-full overflow-hidden border border-slate-800"><div id="hdr-mp-base" class="h-full bg-blue-600 w-0 transition-all"></div></div>
                    </div>
                </div>
                <nav id="sub-menu-bar" class="w-full flex-grow bg-slate-900/50 transition-all duration-300 flex flex-col py-4 overflow-hidden">
                    </nav>
            </aside>

            <main id="content-container" class="flex-1 overflow-auto bg-slate-900 relative custom-scroll">
                <div id="default-view" class="h-full flex flex-col items-center justify-center opacity-20 select-none">
                    <i class="fas fa-shield-halved text-9xl mb-4 text-slate-700"></i>
                    <h1 class="font-cinzel text-4xl">IMPERIALL 2026</h1>
                    <p class="uppercase tracking-widest mt-2">Aguardando seleção de módulo...</p>
                </div>
                </main>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>

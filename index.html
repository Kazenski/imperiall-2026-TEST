<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mestre Leoma - VTT Panel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    
    <link rel="stylesheet" href="style.css" />
    
</head>
<body class="text-slate-200 font-sans h-screen w-screen flex flex-col">

    <div id="auth-view" class="fixed inset-0 z-[9999] bg-slate-950 flex items-center justify-center">
        <div class="max-w-md w-full bg-slate-900 p-8 rounded-xl border border-amber-500/30 shadow-2xl">
            <h2 class="text-3xl font-bold text-center text-amber-500 mb-6 font-cinzel">Acesso ao Sistema</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-1 block">Email</label>
                    <input type="email" id="auth-email" class="w-full bg-slate-950 border border-slate-700 rounded px-4 py-3 outline-none focus:border-amber-500 text-white">
                </div>
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-1 block">Senha</label>
                    <input type="password" id="auth-password" class="w-full bg-slate-950 border border-slate-700 rounded px-4 py-3 outline-none focus:border-amber-500 text-white">
                </div>
                <button id="btn-login" class="w-full bg-amber-600 hover:bg-amber-500 text-black font-bold uppercase tracking-widest py-3 rounded transition-colors mt-4">Entrar</button>
            </div>
        </div>
    </div>

    <div id="app-view" class="hidden flex-col h-full w-full">

        <nav id="global-top-nav" class="bg-slate-950 border-b border-slate-800 flex items-center justify-between px-6 h-14 shrink-0 shadow-md relative z-50">
            <div class="flex items-center gap-6">
                <div class="font-cinzel text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-amber-400 to-orange-500 tracking-wider">
                    PAINEL UNIFICADO
                </div>
                
                <div class="hidden md:flex items-center gap-1 text-sm font-medium text-slate-300">
                    <button class="px-3 py-2 hover:text-white transition-colors border-b-2 border-amber-500 text-amber-500">Início</button>
                    <button class="px-3 py-2 hover:text-white transition-colors border-b-2 border-transparent hover:border-slate-500 flex items-center gap-1">O Mundo <i class="fas fa-caret-down text-[10px]"></i></button>
                    <button class="px-3 py-2 hover:text-white transition-colors border-b-2 border-transparent hover:border-slate-500 flex items-center gap-1">Manual e regras <i class="fas fa-caret-down text-[10px]"></i></button>
                    <button class="px-3 py-2 hover:text-white transition-colors border-b-2 border-transparent hover:border-slate-500 flex items-center gap-1">Ao Mestre <i class="fas fa-caret-down text-[10px]"></i></button>
                    <button class="px-3 py-2 hover:text-white transition-colors border-b-2 border-transparent hover:border-slate-500 flex items-center gap-1">Ao Jogador <i class="fas fa-caret-down text-[10px]"></i></button>
                    <button class="px-3 py-2 hover:text-white transition-colors border-b-2 border-transparent hover:border-slate-500 flex items-center gap-1">Atualizações <i class="fas fa-caret-down text-[10px]"></i></button>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div id="header-world-widget" class="hidden lg:flex"></div> <button id="btn-logout" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 px-4 py-1.5 rounded text-xs font-bold uppercase transition">Sair</button>
            </div>
        </nav>

        <div class="flex flex-1 overflow-hidden">
            
            <aside id="main-sidebar" class="w-72 lg:w-80 bg-[#0a0f18] border-r border-slate-800 flex flex-col shrink-0 overflow-y-auto custom-scroll shadow-[4px_0_24px_rgba(0,0,0,0.5)] z-40">
                
                <div class="w-full aspect-[4/3] bg-black relative border-b border-slate-800 group">
                    <img id="sidebar-char-img" src="https://via.placeholder.com/400x300?text=Sem+Foto" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                    <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-[#0a0f18] to-transparent"></div>
                    
                    <div class="absolute top-2 left-2 right-2">
                        <select id="character-select" class="w-full bg-black/60 border border-slate-600/50 rounded text-slate-200 p-1.5 text-xs focus:border-amber-500 outline-none backdrop-blur-md shadow-lg">
                            <option value="">-- Carregando... --</option>
                        </select>
                    </div>
                </div>

                <div class="p-4 flex flex-col gap-4">
                    <div>
                        <h2 id="sidebar-char-name" class="font-cinzel text-xl text-white font-bold leading-none mb-1 truncate">Personagem</h2>
                        <p id="sidebar-char-class" class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Nvl. -- • Classe</p>
                    </div>

                    <div id="session-selector-container" class="hidden">
                        <select id="session-select" class="w-full bg-indigo-950/30 border border-indigo-500/30 rounded text-indigo-300 p-1.5 text-[10px] uppercase font-bold focus:border-indigo-500 outline-none">
                            <option value="world">Horário Mundial Padrão</option>
                        </select>
                    </div>

                    <div id="header-bars-container" class="flex flex-col gap-3">
                        <div class="relative w-full h-5 bg-slate-950 rounded border border-slate-800 overflow-hidden shadow-inner group" title="Pontos de Vida">
                            <div id="hdr-hp-base" class="absolute left-0 top-0 h-full bg-gradient-to-r from-red-700 to-red-500 transition-all duration-500 z-0" style="width: 0%;"></div>
                            <div id="hdr-hp-extra" class="absolute left-0 top-0 h-full bg-gradient-to-r from-red-900 to-red-800 transition-all duration-500 border-r border-white/30 z-10" style="width: 0%;"></div>
                            <div id="hdr-hp-shield" class="absolute left-0 top-0 h-full bg-gradient-to-r from-amber-600 to-amber-400 transition-all duration-500 shadow-[0_0_10px_orange] border-r border-white/60 z-20" style="width: 0%;"></div>
                            <div class="absolute inset-0 flex items-center justify-between px-2 text-[9px] font-bold text-white drop-shadow-md z-30 pointer-events-none">
                                <span>HP</span> <span id="hdr-hp-text">0 / 0</span>
                            </div>
                        </div>

                        <div class="relative w-full h-5 bg-slate-950 rounded border border-slate-800 overflow-hidden shadow-inner group" title="Pontos de Mana">
                            <div id="hdr-mp-base" class="absolute left-0 top-0 h-full bg-gradient-to-r from-blue-700 to-blue-500 transition-all duration-500 z-0" style="width: 0%;"></div>
                            <div id="hdr-mp-extra" class="absolute left-0 top-0 h-full bg-gradient-to-r from-blue-900 to-blue-800 transition-all duration-500 border-r border-white/30 z-10" style="width: 0%;"></div>
                            <div id="hdr-mp-shield" class="absolute left-0 top-0 h-full bg-gradient-to-r from-cyan-500 to-cyan-300 transition-all duration-500 shadow-[0_0_10px_cyan] border-r border-white/60 z-20" style="width: 0%;"></div>
                            <div class="absolute inset-0 flex items-center justify-between px-2 text-[9px] font-bold text-white drop-shadow-md z-30 pointer-events-none">
                                <span>MP</span> <span id="hdr-mp-text">0 / 0</span>
                            </div>
                        </div>

                        <div id="bar-fome-track" class="relative w-full h-3 bg-slate-950 rounded border border-slate-800 overflow-hidden shadow-inner group transition-colors duration-300" title="Fome">
                            <div id="bar-fome-fill" class="absolute left-0 top-0 h-full bg-gradient-to-r from-amber-700 to-amber-500 transition-all duration-500 z-0" style="width: 100%;"></div>
                            <div class="absolute inset-0 flex items-center justify-center text-[8px] font-bold text-white drop-shadow-md z-30 pointer-events-none">
                                <span id="hdr-fome-text">100/100</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-auto border-t border-slate-800 p-4 bg-slate-900/50">
                    <h4 class="text-[10px] text-slate-500 font-bold uppercase mb-3 tracking-widest text-center">Rolagem Rápida</h4>
                    <div id="dice-container" class="flex flex-wrap justify-center gap-2" id="sidebar-dice-area">
                        </div>
                </div>
            </aside>

            <div class="flex-1 flex flex-col min-w-0 bg-[#0f172a] relative">
                
                <nav id="tab-container" class="bg-[#1e293b] border-b border-[#334155] flex overflow-x-auto custom-scroll shrink-0 px-2 pt-2 gap-1 z-30 shadow-md">
                    <button class="tab-button tab-button-delicate active" data-tab="painel-fichas"><i class="fas fa-id-card"></i> Ficha</button>
                    <button class="tab-button tab-button-delicate" data-tab="rolagem-dados"><i class="fas fa-dice-d20"></i> Log Dados</button>
                    <button class="tab-button tab-button-delicate" data-tab="calculadora-combate"><i class="fas fa-calculator"></i> Calc. Dano</button>
                    <button class="tab-button tab-button-delicate" data-tab="minhas-habilidades"><i class="fas fa-fire"></i> Skills</button>
                    <button class="tab-button tab-button-delicate" data-tab="mochila"><i class="fas fa-shopping-bag"></i> Mochila</button>
                    <button class="tab-button tab-button-delicate" data-tab="itens-equipados"><i class="fas fa-tshirt"></i> Equip</button>
                    <button class="tab-button tab-button-delicate" data-tab="calculadora-atributos"><i class="fas fa-chart-bar"></i> Status</button>
                    <button class="tab-button tab-button-delicate" data-tab="constelacao"><i class="fas fa-star"></i> Árvore</button>
                    <button class="tab-button tab-button-delicate" data-tab="crafting"><i class="fas fa-hammer"></i> Craft</button>
                    <button class="tab-button tab-button-delicate" data-tab="extracao"><i class="fas fa-recycle"></i> Reciclar</button>
                    <button class="tab-button tab-button-delicate" data-tab="colecao-craft"><i class="fas fa-book"></i> Diário</button>
                    <button class="tab-button tab-button-delicate" data-tab="arma-espiritual"><i class="fas fa-ghost"></i> Ego</button>
                    <button class="tab-button tab-button-delicate" data-tab="meus-pets"><i class="fas fa-dragon"></i> Pets</button>
                    <button class="tab-button tab-button-delicate" data-tab="recursos-reputacao"><i class="fas fa-crown"></i> Império</button>
                    <button class="tab-button tab-button-delicate" data-tab="comercio"><i class="fas fa-coins"></i> Loja</button>
                    <button class="tab-button tab-button-delicate" data-tab="mapa-movimento"><i class="fas fa-map-marked-alt"></i> Mapa</button>
                    <button class="tab-button tab-button-delicate border-red-500 text-red-400" data-tab="arena-combate"><i class="fas fa-chess-board"></i> Arena</button>
                </nav>

                <main id="content-container" class="flex-1 overflow-y-auto custom-scroll p-4 md:p-6 lg:p-8 relative">
                    
                    <div id="painel-fichas-content" class="tab-content active h-full"></div>
                    
                    <div id="rolagem-dados-content" class="tab-content">
                        <div id="log-rolagens-container" class="max-w-3xl mx-auto mt-0">
                            <h3 class="font-cinzel text-xl mb-4 text-slate-300 border-b border-slate-700 pb-2">Log de Rolagens (Últimas 50)</h3>
                            <div id="log-lista" class="space-y-1"></div>
                        </div>
                    </div>
                    
                    <div id="calculadora-combate-content" class="tab-content">
                        <div class="form-field mb-4"><select id="calc-combate-habilidade-select" class="hidden"></select></div>
                        <p id="calc-combate-mensagem-status"></p>
                        <div id="calc-combate-painel-calculo" class="hidden">
                            <p id="calc-combate-valor-base"></p>
                            <div id="calc-combate-lista-atributos"></div>
                        </div>
                    </div>
                    
                    <div id="minhas-habilidades-content" class="tab-content"></div>
                    <div id="mochila-content" class="tab-content"></div>
                    <div id="itens-equipados-content" class="tab-content h-full"></div>
                    <div id="calculadora-atributos-content" class="tab-content">
                        <div id="calculator-content" class="hidden">
                            <div id="atk-container"></div>
                            <div id="def-container"></div>
                            <div id="eva-container"></div>
                        </div>
                    </div>
                    <div id="constelacao-content" class="tab-content h-full p-0 overflow-hidden"></div>
                    <div id="crafting-content" class="tab-content"></div>
                    <div id="extracao-content" class="tab-content"></div>
                    <div id="colecao-craft-content" class="tab-content"></div>
                    <div id="arma-espiritual-content" class="tab-content"></div>
                    <div id="meus-pets-content" class="tab-content"></div>
                    <div id="recursos-reputacao-content" class="tab-content h-full flex flex-col"></div>
                    <div id="comercio-content" class="tab-content h-full flex flex-col"></div>
                    <div id="mapa-movimento-content" class="tab-content h-full flex flex-col">
                        <div id="map-player-container" class="flex-grow rounded-xl border border-slate-700 overflow-hidden relative z-0"></div>
                    </div>
                    <div id="arena-combate-content" class="tab-content h-full flex flex-col">
                        <div id="arena-content" class="flex-grow w-full h-full relative z-0"></div>
                    </div>

                </main>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>

    <script>
        // Uma pequena ponte para garantir que a imagem principal vá para a sidebar
        document.addEventListener('DOMContentLoaded', () => {
            // Monitora mudanças no DOM da div do editor de fichas para roubar a imagem e nome para a sidebar
            const observer = new MutationObserver(() => {
                const mainImg = document.getElementById('main-image-display');
                const nameInput = document.getElementById('editor-nome');
                const lvlView = document.getElementById('view-level');
                const classView = document.getElementById('editor-classeId');
                
                if (mainImg && mainImg.src && !mainImg.src.includes('Sem+Foto')) {
                    document.getElementById('sidebar-char-img').src = mainImg.src;
                }
                
                if (nameInput && nameInput.value) {
                    document.getElementById('sidebar-char-name').textContent = nameInput.value;
                }
                
                if (lvlView && classView && classView.options[classView.selectedIndex]) {
                    const clsName = classView.options[classView.selectedIndex].text;
                    document.getElementById('sidebar-char-class').textContent = `Nvl. ${lvlView.value || 1} • ${clsName}`;
                }
            });
            
            const contentContainer = document.getElementById('content-container');
            if (contentContainer) {
                observer.observe(contentContainer, { childList: true, subtree: true, attributes: true, characterData: true });
            }
        });
    </script>
</body>
</html>
